<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Kaizen Capture Settings</title>
  <style>
    :root {
      color-scheme: light dark;
      --fg: #111;
      --bg: #fff;
      --muted: #6b6b6b;
      --border: #e5e5e5;
      --accent: #2563eb;
      --card: #fafafa;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #fafafa;
        --bg: #0a0a0a;
        --muted: #a3a3a3;
        --border: #262626;
        --card: #161616;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
    body {
      font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
      min-width: 480px;
    }
    h1 { font-size: 18px; margin: 0 0 4px; }
    .sub { color: var(--muted); margin-bottom: 24px; }
    label { display: block; font-weight: 500; margin: 18px 0 6px; }
    .hint { color: var(--muted); font-size: 11px; margin-top: 4px; }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      font: inherit;
      color: var(--fg);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    input:focus { outline: none; border-color: var(--accent); }
    .row { margin-top: 20px; display: flex; gap: 10px; align-items: center; }
    button {
      padding: 8px 14px;
      font: inherit; font-weight: 600;
      border: 1px solid var(--fg);
      background: var(--fg); color: var(--bg);
      border-radius: 6px;
      cursor: pointer;
    }
    .saved { color: #15803d; font-size: 12px; }
    code { background: var(--card); padding: 1px 5px; border-radius: 3px; font-size: 11.5px; }
  </style>
</head>
<body>
  <h1>Kaizen Capture</h1>
  <div class="sub">Send the current tab to your smart-capture inbox.</div>

  <label for="endpoint">Endpoint</label>
  <input id="endpoint" type="text" placeholder="https://internal.eddiecohen.com" />
  <div class="hint">Your private Kaizen URL. Don't include a trailing slash.</div>

  <label for="token">Capture token</label>
  <input id="token" type="password" placeholder="re_… or whatever your CAPTURE_TOKEN is" />
  <div class="hint">The same bearer token your Mac Quick Todo app uses. Find it in your Vercel env vars under <code>CAPTURE_TOKEN</code>.</div>

  <div class="row">
    <button id="save" type="button">Save</button>
    <span id="status" class="saved"></span>
  </div>
  <script src="options.js"></script>
</body>
</html>
