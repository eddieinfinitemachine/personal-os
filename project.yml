name: PersonalOS

options:
  bundleIdPrefix: com.zelig.PersonalOS
  deploymentTarget:
    macOS: "15.0"
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  xcodeVersion: "26.0"

settings:
  base:
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "0.1.0"

packages:
  PersonalOSKit:
    path: packages/PersonalOSKit

targets:
  PersonalOS-Mac:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: apps/PersonalOS-Mac
        excludes:
          - "Resources/Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zelig.PersonalOS.mac
        PRODUCT_NAME: PersonalOS
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_CFBundleDisplayName: PersonalOS
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        CODE_SIGN_ENTITLEMENTS: apps/PersonalOS-Mac/PersonalOS.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: PersonalOSKit
        product: PersonalOSModels
      - package: PersonalOSKit
        product: PersonalOSPersistence
      - package: PersonalOSKit
        product: PersonalOSServices
      - package: PersonalOSKit
        product: PersonalOSUI

  PersonalOS-iOS:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: apps/PersonalOS-iOS
        excludes:
          - "Resources/Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zelig.PersonalOS.ios
        PRODUCT_NAME: PersonalOS
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: PersonalOS
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Used to unlock the Vault, where you store sensitive numbers and codes."
        CODE_SIGN_ENTITLEMENTS: apps/PersonalOS-iOS/PersonalOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: PersonalOSKit
        product: PersonalOSModels
      - package: PersonalOSKit
        product: PersonalOSPersistence
      - package: PersonalOSKit
        product: PersonalOSServices
      - package: PersonalOSKit
        product: PersonalOSUI

schemes:
  PersonalOS-Mac:
    build:
      targets:
        PersonalOS-Mac: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release

  PersonalOS-iOS:
    build:
      targets:
        PersonalOS-iOS: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
